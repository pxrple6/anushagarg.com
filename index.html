<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>anushagarg.com</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    .fade-in {
      animation: fadeIn 2s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    #typewriter {
      border-right: .15em solid #333;
      white-space: nowrap;
      overflow: hidden;
    }
  </style>
</head>
<body class="font-roboto bg-white">

  <!-- Main Content -->
  <div class="main-content fade-in">
    <!-- Navigation -->
    <div class="flex justify-between items-center px-8 py-6 border-b">
      <div class="flex items-center">
        <span class="text-2xl font-bold text-pink-600">ANUSHA</span>
      </div>
      <button id="menu-toggle" class="text-pink-600 hover:text-pink-800 focus:outline-none">
        <i class="fas fa-bars fa-2x"></i>
      </button>
    </div>

    <nav id="nav-menu" class="hidden">
      <ul class="px-8 py-4 space-y-2 md:space-y-0 md:flex md:space-x-6">
        <li><a class="block text-pink-600 hover:text-pink-800 transition-colors" href="index2.html">HOME</a></li>
        <li><a class="block text-gray-600 hover:text-pink-600 transition-colors" href="about.html">ABOUT</a></li>
        <li><a class="block text-gray-600 hover:text-pink-600 transition-colors" href="poems.html">POEMS</a></li>
        <li><a class="block text-gray-600 hover:text-pink-600 transition-colors" href="#">SHORT STORIES</a></li>
        <li><a class="block text-gray-600 hover:text-pink-600 transition-colors" href="contact.html">CONTACT</a></li>
      </ul>
    </nav>

    <!-- Hero Section -->
    <div class="flex flex-col md:flex-row items-center px-8 py-16">
      <!-- Image and Blob -->
      <div class="md:w-1/2 relative flex justify-center items-center">
        <!-- Blob Background -->
        <div class="absolute -z-10 w-[300px] h-[300px] md:w-[400px] md:h-[400px]">
          <svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
            <g transform="translate(400,300)">
              <path fill="#f9a8d4" d="M151.2,-153.4C194.6,-113.7,222.4,-56.9,215.5,-6.4C208.6,44.2,167,88.4,123.7,119.3C80.5,150.2,35.7,167.7,-10.5,174.2C-56.6,180.7,-113.2,176.2,-145.4,141.5C-177.6,106.8,-185.4,41.9,-170.4,-13.7C-155.4,-69.3,-117.7,-115.5,-72.3,-154.3C-26.9,-193,26.2,-224.3,81.5,-219.2C136.8,-214.1,193.1,-172.5,151.2,-153.4Z" />
            </g>
          </svg>
        </div>

        <!-- Your Image -->
        <img alt="Portrait of Anusha" class="rounded-full fade-in relative z-10" height="250" width="250" src="anusha.jpg" />
      </div>

      <!-- Text Content -->
      <div class="md:w-1/2 text-center md:text-left mt-10 md:mt-0">
        <h2 class="text-5xl font-bold text-pink-600 fade-in">
          HELLO<br/>
          MY NAME IS<br/>
          <span id="typewriter"></span>
        </h2>
        <p class="text-gray-600 mt-6 fade-in text-lg">
          Nice to meet you! I'm a Poet/Coder. Get to know me more!
        </p>
        <a href="about.html" class="mt-8 inline-block px-8 py-3 bg-pink-600 text-white rounded-full fade-in hover:bg-pink-700 transition-colors">
          ABOUT ME
        </a>
        <div class="mt-8 space-x-4 fade-in">
          <a href="https://www.instagram.com/garganusha_" target="_blank" class="text-pink-600 hover:text-pink-800 transition-colors">
            <i class="fab fa-instagram fa-2x"></i>
          </a>
          <a href="https://www.linkedin.com/in/yourprofile" target="_blank" class="text-pink-600 hover:text-pink-800 transition-colors">
            <i class="fab fa-linkedin fa-2x"></i>
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="bg-pink-600 text-white text-center py-6 mt-6 fade-in">
    &copy; 2025 anushagarg.com
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const menuToggle = document.getElementById("menu-toggle");
      const navMenu = document.getElementById("nav-menu");
      menuToggle.addEventListener("click", () => {
        navMenu.classList.toggle("hidden");
      });

      const text = "ANUSHA";
      let index = 0;
      const speed = 150;
      const pauseDuration = 2000;

      function typeWriter() {
        const target = document.getElementById("typewriter");
        if (index < text.length) {
          target.innerHTML += text.charAt(index);
          index++;
          setTimeout(typeWriter, speed);
        } else {
          setTimeout(() => {
            target.innerHTML = "";
            index = 0;
            typeWriter();
          }, pauseDuration);
        }
      }

      typeWriter();
    });
  </script>
</body>
</html>
