<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>anushagarg.com</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    .fade-in {
      animation: fadeIn 2s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    #typewriter {
      border-right: .15em solid #333;
      white-space: nowrap;
      overflow: hidden;
    }
    .blob-bg {
      position: absolute;
      top: 0;
      left: 0;
      z-index: -1;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
  </style>
</head>
<body class="relative font-roboto bg-white">

  <!-- Blob Background -->
  <div class="blob-bg">
    <svg class="w-full h-full" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
      <g transform="translate(400,300)">
        <path fill="#f9a8d4" d="M151.2,-153.4C194.6,-113.7,222.4,-56.9,215.5,-6.4C208.6,44.2,167,88.4,123.7,119.3C80.5,150.2,35.7,167.7,-10.5,174.2C-56.6,180.7,-113.2,176.2,-145.4,141.5C-177.6,106.8,-185.4,41.9,-170.4,-13.7C-155.4,-69.3,-117.7,-115.5,-72.3,-154.3C-26.9,-193,26.2,-224.3,81.5,-219.2C136.8,-214.1,193.1,-172.5,151.2,-153.4Z" />
      </g>
    </svg>
  </div>

  <!-- Main Content -->
  <div class="relative z-10 px-8 py-6">
    <!-- Navigation -->
    <div class="flex justify-between items-center border-b pb-4">
      <div class="text-2xl font-bold text-pink-600">ANUSHA</div>
      <button id="menu-toggle" class="text-pink-600 hover:text-pink-800 focus:outline-none">
        <i class="fas fa-bars fa-2x"></i>
      </button>
    </div>

    <!-- Nav Menu -->
    <nav id="nav-menu" class="hidden mt-4">
      <ul class="space-y-2 md:flex md:space-x-6 md:space-y-0">
        <li><a class="text-pink-600 hover:text-pink-800" href="index2.html">HOME</a></li>
        <li><a class="text-gray-600 hover:text-pink-600" href="about.html">ABOUT</a></li>
        <li><a class="text-gray-600 hover:text-pink-600" href="poems.html">POEMS</a></li>
        <li><a class="text-gray-600 hover:text-pink-600" href="#">SHORT STORIES</a></li>
        <li><a class="text-gray-600 hover:text-pink-600" href="contact.html">CONTACT</a></li>
      </ul>
    </nav>

    <!-- Hero Section -->
    <div class="flex flex-col-reverse md:flex-row items-center py-16 gap-12">
      <div class="md:w-1/2 text-center md:text-left fade-in">
        <h2 class="text-5xl font-bold text-pink-600 leading-tight">
          HELLO<br/>MY NAME IS<br/>
          <span id="typewriter"></span>
        </h2>
        <p class="text-gray-600 mt-6 text-lg">
          Nice to meet you! I'm a Poet/Coder. Get to know me more!
        </p>
        <a href="about.html" class="mt-8 inline-block px-8 py-3 bg-pink-600 text-white rounded-full hover:bg-pink-700 transition-colors">
          ABOUT ME
        </a>
        <div class="mt-8 space-x-4">
          <a href="https://www.instagram.com/garganusha_" target="_blank" class="text-pink-600 hover:text-pink-800">
            <i class="fab fa-instagram fa-2x"></i>
          </a>
          <a href="https://www.linkedin.com/in/yourprofile" target="_blank" class="text-pink-600 hover:text-pink-800">
            <i class="fab fa-linkedin fa-2x"></i>
          </a>
        </div>
      </div>
      <div class="md:w-1/2 flex justify-center">
        <img alt="Portrait of Anusha" class="rounded-full fade-in" height="250" width="250" src="anusha.jpg" />
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-pink-600 text-white text-center py-6 fade-in mt-6">
    &copy; 2025 anushagarg.com
  </footer>

  <!-- Scripts -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const menuToggle = document.getElementById("menu-toggle");
      const navMenu = document.getElementById("nav-menu");
      menuToggle.addEventListener("click", () => {
        navMenu.classList.toggle("hidden");
      });

      const text = "ANUSHA";
      let index = 0;
      const speed = 150;
      const pauseDuration = 2000;

      function typeWriter() {
        const target = document.getElementById("typewriter");
        if (index < text.length) {
          target.innerHTML += text.charAt(index);
          index++;
          setTimeout(typeWriter, speed);
        } else {
          setTimeout(() => {
            target.innerHTML = "";
            index = 0;
            typeWriter();
          }, pauseDuration);
        }
      }

      typeWriter();
    });
  </script>
</body>
</html>
