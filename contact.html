<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - anushagarg.com</title>
  <link
    href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
    rel="stylesheet"
  />
  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
    rel="stylesheet"
  />
  <style>
    .fade-in {
      animation: fadeIn 2s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body class="font-roboto bg-white-100">
  <!-- Header -->
  <div class="bg-white shadow-md mx-auto max-w-4xl fade-in">
    <div class="flex justify-between items-center px-6 py-4 border-b">
      <div class="flex items-center">
        <span class="text-xl font-bold text-pink-600">ANUSHA</span>
      </div>
      <!-- Hamburger Menu Icon -->
      <button id="menu-toggle" class="text-pink-600 hover:text-pink-800 focus:outline-none md:hidden">
        <i class="fas fa-bars fa-3x"></i>
      </button>
      <!-- Navigation Menu -->
      <nav id="nav-menu" class="hidden md:flex space-x-4">
        <a class="text-gray-600" href="index2.html">HOME</a>
        <a class="text-pink-600 border-b-2 border-pink-600" href="about.html">ABOUT</a>
        <a class="text-gray-600" href="poems.html">POEMS</a>
        <a class="text-gray-600" href="">SHORT STORIES</a>
        <a class="text-gray-600" href="contact.html">CONTACT</a>
      </nav>
    </div>
    <!-- Mobile Menu -->
    <div id="mobile-menu" class="hidden absolute top-full left-0 w-full bg-white shadow-md md:hidden">
      <a class="block px-6 py-3 text-gray-600 border-b" href="index.html">HOME</a>
      <a class="block px-6 py-3 text-pink-600 border-b" href="about.html">ABOUT</a>
      <a class="block px-6 py-3 text-gray-600 border-b" href="poems.html">POEMS</a>
      <a class="block px-6 py-3 text-gray-600 border-b" href="shortstories.html">SHORT STORIES</a>
      <a class="block px-6 py-3 text-gray-600" href="contact.html">CONTACT</a>
    </div>
  </div>

  <!-- Contact Section -->
  <div class="px-6 py-12">
    <h2 class="text-4xl font-bold text-pink-600 text-center fade-in">CONTACT ME</h2>
    <div class="mt-8 flex flex-col md:flex-row items-center">
      <!-- Contact Information -->
      <div class="md:w-1/3 text-center md:text-left">
        <p class="text-gray-600">Feel free to reach out to me through any of the following channels:</p>
        <div class="mt-4">
          <a href="mailto:pxrple6@gmail.com" class="text-pink-600 hover:text-pink-800">
            <i class="fas fa-envelope fa-2x"></i>
            <p>Email</p>
          </a>
        </div>
        <div class="mt-4">
          <a href="https://www.instagram.com/garganusha_" class="text-pink-600 hover:text-pink-800">
            <i class="fab fa-instagram fa-2x"></i>
            <p>Instagram</p>
          </a>
        </div>
        <div class="mt-4">
          <a href="https://www.linkedin.com/in/yourusername" class="text-pink-600 hover:text-pink-800">
            <i class="fab fa-linkedin fa-2x"></i>
            <p>LinkedIn</p>
          </a>
        </div>
      </div>

   
      <div class="md:w-2/3 mt-6 md:mt-0 md:pl-8">
        <form action="mailto:pxrple6@gmail.com" method="post" enctype="text/plain">
          <div class="mb-4">
            <label for="name" class="block text-gray-600">Name</label>
            <input type="text" id="name" name="name" class="w-full p-2 border border-gray-300 rounded" required />
          </div>
          <div class="mb-4">
            <label for="email" class="block text-gray-600">Email</label>
            <input type="email" id="email" name="email" class="w-full p-2 border border-gray-300 rounded" required />
          </div>
          <div class="mb-4">
            <label for="message" class="block text-gray-600">Message</label>
            <textarea id="message" name="message" class="w-full p-2 border border-gray-300 rounded" rows="4" required></textarea>
          </div>
          <button type="submit" class="w-full bg-pink-600 text-white p-2 rounded hover:bg-pink-800">
            Send Message
          </button>
        </form>
      </div>
    </div>
  </div>


  <div class="bg-pink-600 text-white text-center py-4 mt-4 fade-in">
    &copy; 2025 anushagarg.com
  </div>
<script src="https://embed.ycb.me"
	async="true"
	data-domain="anushagarg"
	data-type="button-floating"
	data-buttonicon="ycbm"
	data-buttonposition="bottomRight"
	data-buttoncolor="#F4CAE0"
	data-displaymode="auto"></script>
  <script>
    const menuToggle = document.getElementById("menu-toggle");
    const mobileMenu = document.getElementById("mobile-menu");

    menuToggle.addEventListener("click", () => {
      mobileMenu.classList.toggle("hidden");
    });

    document.addEventListener("click", (event) => {
      if (!menuToggle.contains(event.target) && !mobileMenu.contains(event.target)) {
        mobileMenu.classList.add("hidden");
      }
    });
  </script>
</body>
</html>
